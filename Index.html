<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chicken Farm - Login & Register</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- App Styles -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- ==========================================
         LOGIN PAGE VIEW
         ========================================== -->
    <div class="view-wrapper active" id="view-login">

        <!-- Login Decorations -->
        <img src="https://placehold.co/150x120/transparent/999?text=Cow+Drawing" class="deco deco-cow" alt="Cow Decoration">
        <img src="https://placehold.co/200x250/transparent/999?text=Plants+Drawing" class="deco deco-plants-login" alt="Plants Decoration">

        <div class="form-container">
            <div class="header">
                <img src="https://img.sanishtech.com/u/cf2f64045df26f2b4e9f31db02bc4506.jpg" alt="Chicken Farm Logo">
                <h1>Welcome back</h1>
                <p>Please enter your details to login</p>
            </div>

            <form id="formLogin">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="loginEmail" class="form-control" placeholder="example@gmail.com" required>
                </div>

                <div class="form-group">
                    <div class="label-row">
                        <label>Password</label>
                        <a href="#" class="forgot-link">Forgotten password?</a>
                    </div>
                    <div class="input-wrapper">
                        <input type="password" id="loginPassword" class="form-control" placeholder="Enter your password" required>
                        <i class="fa-solid fa-eye eye-icon toggle-password" data-target="loginPassword"></i>
                    </div>
                </div>

                <div class="checkbox-group">
                    <input type="checkbox" id="rememberMe">
                    <label for="rememberMe">Remember me</label>
                </div>

                <button type="submit" class="btn btn-primary">Login</button>
            </form>

            <div class="divider"><span>OR</span></div>

            <button type="button" class="btn btn-google">
                <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" alt="Google Logo">
            </button>

            <div class="footer">
                <p>Don't have an account? <a id="link-to-register">Register</a></p>
            </div>
        </div>
    </div>


    <!-- ==========================================
         REGISTER PAGE VIEW
         ========================================== -->
    <div class="view-wrapper" id="view-register">

        <!-- Register Decorations -->
        <img src="https://placehold.co/140x120/transparent/999?text=Tomatoes" class="deco deco-tomatoes" alt="Tomatoes Decoration">
        <img src="https://placehold.co/250x250/transparent/999?text=Plants+%2B+Broccoli" class="deco deco-plants-broccoli" alt="Plants and Broccoli Decoration">

        <div class="form-container">
            <div class="header">
                <img src="https://img.sanishtech.com/u/cf2f64045df26f2b4e9f31db02bc4506.jpg" alt="Chicken Farm Logo">
                <h1>Create an Account</h1>
                <p>Please enter your details to sign up</p>
            </div>

            <form id="formRegister">
                <div class="form-group">
                    <label>Full name</label>
                    <input type="text" id="regName" class="form-control" placeholder="John Doe" required>
                </div>

                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="regEmail" class="form-control" placeholder="example@gmail.com" required>
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <div class="input-wrapper">
                        <input type="password" id="regPassword" class="form-control" placeholder="Create a password" required>
                        <i class="fa-solid fa-eye eye-icon toggle-password" data-target="regPassword"></i>
                    </div>
                </div>

                <div class="form-group">
                    <label>Confirm password</label>
                    <div class="input-wrapper">
                        <input type="password" id="regConfirmPassword" class="form-control" placeholder="Confirm your password" required>
                        <i class="fa-solid fa-eye eye-icon toggle-password" data-target="regConfirmPassword"></i>
                    </div>
                </div>

                <div class="checkbox-group">
                    <input type="checkbox" id="terms" required>
                    <label for="terms">I accept <a href="#">Terms and Conditions</a></label>
                </div>

                <button type="submit" class="btn btn-primary">Sign up</button>
            </form>

            <div class="divider"><span>OR</span></div>

            <button type="button" class="btn btn-google">
                <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" alt="Google Logo">
            </button>

            <div class="footer">
                <p>Have an account? <a id="link-to-login">Log in</a></p>
            </div>
        </div>
    </div>


    <!-- App Script -->
    <script src="script.js"></script>
</body>
</html>
